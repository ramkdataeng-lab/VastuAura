name: Deploy to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest
    environment: dev
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Capacitor iOS
        run: |
          npx cap add ios
          npx cap sync ios
          echo "Finding xcworkspace location:"
          # Find the main workspace, avoiding internal ones inside .xcodeproj
          find ios -name "*.xcworkspace" -not -path "*.xcodeproj/*"
          
          # Force copy fastlane to both potential locations just to be safe
          mkdir -p ios/App
          cp -R fastlane ios/App/
          cp -R fastlane ios/

      - name: Setup Fastlane
        run: gem install fastlane

      - name: Build and Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Find the main workspace OR project, avoiding internal ones inside bundles
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*.xcodeproj/*" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            WORKSPACE=$(find ios -name "*.xcodeproj" | head -n 1)
          fi
          
          WORKSPACE_DIR=$(dirname "$WORKSPACE")
          WORKSPACE_NAME=$(basename "$WORKSPACE")
          echo "Found Main Project/Workspace: $WORKSPACE_NAME in $WORKSPACE_DIR"
          
          cd "$WORKSPACE_DIR"
          # Ensure fastlane was copied here correctly
          if [ ! -d "fastlane" ]; then
            mkdir -p fastlane
            cp -R ../../fastlane/* ./fastlane/ || cp -R ../fastlane/* ./fastlane/
          fi
          
          if [[ "$APP_STORE_CONNECT_KEY_CONTENT" == *"BEGIN"* ]]; then
            echo "$APP_STORE_CONNECT_KEY_CONTENT" > /tmp/AuthKey.p8
          else
            echo "$APP_STORE_CONNECT_KEY_CONTENT" | base64 --decode > /tmp/AuthKey.p8
          fi
          
          # List schemes to verify the correct one
          xcodebuild -list -project "$WORKSPACE_NAME" || xcodebuild -list -workspace "$WORKSPACE_NAME"
          # Run fastlane with the detected project/workspace
          fastlane ios beta workspace:"$WORKSPACE_NAME"
