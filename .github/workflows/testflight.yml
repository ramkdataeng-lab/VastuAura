name: Deploy to TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: macos-latest
    environment: dev
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Capacitor iOS
        run: |
          npx cap add ios
          npx cap sync ios
          echo "Finding xcworkspace location:"
          find ios -name "*.xcworkspace"
          ls -la ios/App || ls -la ios
          cp -R fastlane ios/App/fastlane || cp -R fastlane ios/fastlane

      - name: Setup Fastlane
        run: gem install fastlane

      - name: Build and Upload to TestFlight
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          WORKSPACE_DIR=$(dirname "$WORKSPACE")
          WORKSPACE_NAME=$(basename "$WORKSPACE")
          echo "Found Workspace: $WORKSPACE_NAME in $WORKSPACE_DIR"
          
          cd "$WORKSPACE_DIR"
          if [[ "$APP_STORE_CONNECT_KEY_CONTENT" == *"BEGIN"* ]]; then
            echo "$APP_STORE_CONNECT_KEY_CONTENT" > AuthKey.p8
          else
            echo "$APP_STORE_CONNECT_KEY_CONTENT" | base64 --decode > AuthKey.p8
          fi
          
          # List schemes to verify the correct one
          xcodebuild -list -workspace "$WORKSPACE_NAME"
          # Run fastlane from where the workspace is
          fastlane ios beta workspace:"$WORKSPACE_NAME"
